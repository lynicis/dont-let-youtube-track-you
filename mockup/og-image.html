<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image - Don't Let YouTube Track You</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 40%, #16213e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.icon-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  margin-bottom: 16px;
}
.icon-glow {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,0,0.12) 0%, transparent 70%);
}
.name {
  font-size: 32px;
  font-weight: 700;
  color: #e0e0e0;
  text-align: center;
  margin-bottom: 10px;
}
.tagline {
  font-size: 20px;
  color: #8888a0;
  text-align: center;
  margin-bottom: 20px;
}
.pills {
  display: flex;
  gap: 12px;
}
.pill {
  background: rgba(255,0,0,0.1);
  border: 1px solid rgba(255,0,0,0.25);
  border-radius: 16px;
  padding: 6px 16px;
  font-size: 14px;
  color: #e0e0e0;
}
</style>
</head>
<body>
<div class="container">
  <div class="icon-wrap">
    <div class="icon-glow"></div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100" height="100" style="position:relative;z-index:1;">
      <defs><clipPath id="rs"><rect x="4" y="4" width="120" height="120" rx="24" ry="24"/></clipPath></defs>
      <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="#1a1a2e"/>
      <g clip-path="url(#rs)">
        <path d="M64 36 C38 36, 18 64, 18 64 C18 64, 38 92, 64 92 C90 92, 110 64, 110 64 C110 64, 90 36, 64 36 Z" fill="none" stroke="#ff0000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="64" cy="64" r="14" fill="none" stroke="#ff0000" stroke-width="5.5"/>
        <circle cx="64" cy="64" r="5" fill="#ff0000"/>
        <line x1="30" y1="98" x2="98" y2="30" stroke="#ff0000" stroke-width="6.5" stroke-linecap="round"/>
      </g>
    </svg>
  </div>
  <div class="name">Don't Let YouTube Track You</div>
  <div class="tagline">Your YouTube history. Your control.</div>
  <div class="pills">
    <span class="pill">Private &amp; Local</span>
    <span class="pill">E2E Encrypted Sync</span>
    <span class="pill">No Google Account</span>
  </div>
</div>
</body>
</html>
