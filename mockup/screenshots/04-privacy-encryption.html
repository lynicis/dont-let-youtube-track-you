<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Privacy &amp; Encryption - Screenshot</title>
<style>
/* ── Page canvas (1280x800) ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px;
  height: 800px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 40%, #16213e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.scene {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
}

/* ── Top: Icon + Name ── */
.top-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.top-brand__icon-wrap {
  width: 80px;
  height: 80px;
}
.top-brand__name {
  font-size: 22px;
  font-weight: 700;
  color: #e0e0e0;
  letter-spacing: 0.3px;
}

/* ── Flow Diagram ── */
.flow {
  display: flex;
  align-items: center;
  gap: 0;
}

.flow-box {
  background: #1f1f3a;
  border: 1px solid #2a2a4a;
  border-radius: 12px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 220px;
}
.flow-box__icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.flow-box__label {
  font-size: 15px;
  font-weight: 600;
  color: #e0e0e0;
  text-align: center;
}

/* ── Arrows ── */
.flow-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 140px;
  position: relative;
}
.flow-arrow__line {
  width: 100%;
  height: 2px;
  position: relative;
}
.flow-arrow__label {
  font-size: 12px;
  color: #8888a0;
  white-space: nowrap;
  font-weight: 500;
}
.flow-arrow__lock {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Feature Pills ── */
.features {
  display: flex;
  gap: 16px;
}
.feature-pill {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 20px;
  padding: 8px 20px;
  color: #e0e0e0;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="scene">
  <!-- Top Brand -->
  <div class="top-brand">
    <div class="top-brand__icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="80" height="80">
        <defs><clipPath id="rs"><rect x="4" y="4" width="120" height="120" rx="24" ry="24"/></clipPath></defs>
        <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="#1a1a2e"/>
        <g clip-path="url(#rs)">
          <path d="M64 36 C38 36, 18 64, 18 64 C18 64, 38 92, 64 92 C90 92, 110 64, 110 64 C110 64, 90 36, 64 36 Z" fill="none" stroke="#ff0000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="64" cy="64" r="14" fill="none" stroke="#ff0000" stroke-width="5.5"/>
          <circle cx="64" cy="64" r="5" fill="#ff0000"/>
          <line x1="30" y1="98" x2="98" y2="30" stroke="#ff0000" stroke-width="6.5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <span class="top-brand__name">Don't Let YouTube Track You</span>
  </div>

  <!-- Flow Diagram -->
  <div class="flow">
    <!-- Box 1: Browser -->
    <div class="flow-box">
      <div class="flow-box__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <span class="flow-box__label">Your Browser</span>
    </div>

    <!-- Arrow 1: Stored locally -->
    <div class="flow-arrow">
      <span class="flow-arrow__label">Stored locally</span>
      <svg width="140" height="20" viewBox="0 0 140 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="10" x2="126" y2="10" stroke="#ff0000" stroke-width="2"/>
        <polygon points="126,4 140,10 126,16" fill="#ff0000"/>
      </svg>
    </div>

    <!-- Box 2: Local Database -->
    <div class="flow-box">
      <div class="flow-box__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4.03 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
        </svg>
      </div>
      <span class="flow-box__label">Local SQLite Database</span>
    </div>

    <!-- Arrow 2: E2E Encrypted -->
    <div class="flow-arrow">
      <div class="flow-arrow__lock">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="flow-arrow__label">E2E Encrypted</span>
      </div>
      <svg width="140" height="20" viewBox="0 0 140 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="10" x2="126" y2="10" stroke="#ff0000" stroke-width="2"/>
        <polygon points="126,4 140,10 126,16" fill="#ff0000"/>
      </svg>
    </div>

    <!-- Box 3: Optional Sync -->
    <div class="flow-box">
      <div class="flow-box__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
        </svg>
      </div>
      <span class="flow-box__label">Optional Sync</span>
    </div>
  </div>

  <!-- Feature Pills -->
  <div class="features">
    <span class="feature-pill">No Google Account</span>
    <span class="feature-pill">No Analytics</span>
    <span class="feature-pill">100% Open Source</span>
  </div>
</div>

</body>
</html>
