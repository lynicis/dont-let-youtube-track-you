<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>History Tab - Screenshot</title>
<style>
/* ── Page canvas (1280x800) ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px;
  height: 800px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 40%, #16213e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Popup container (scaled up for screenshot) ── */
.popup {
  width: 400px;
  height: 500px;
  display: flex;
  flex-direction: column;
  background: #1a1a2e;
  color: #e0e0e0;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  transform: scale(1.35);
}

/* ── Header ── */
.popup__header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.popup__icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}
.popup__title {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* ── Tab Bar ── */
.popup__tabs {
  display: flex;
  border-bottom: 1px solid #2a2a4a;
  background: #1a1a2e;
  padding: 0 8px;
}
.popup__tab {
  flex: 1;
  padding: 8px 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: #8888a0;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.popup__tab--active {
  color: #ff0000;
  border-bottom-color: #ff0000;
}
.tab-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-left: 5px;
  vertical-align: middle;
  background: #22c55e;
}

/* ── Content Area ── */
.popup__content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── History List ── */
.history-list {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.history-list__search {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid #2a2a4a;
}
.history-list__search-icon {
  font-size: 14px;
  flex-shrink: 0;
}
.history-list__search-input {
  flex: 1;
  background: #0f0f23;
  border: 1px solid #2a2a4a;
  border-radius: 6px;
  padding: 6px 10px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.history-list__search-input::placeholder {
  color: #666680;
}
.history-list__scroll {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 8px;
}
.history-list__group-label {
  padding: 8px 16px 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #666680;
}

/* ── History Item ── */
.history-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 16px;
  background: none;
  border: none;
  color: #e0e0e0;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
}
.history-item:hover {
  background: #1f1f3a;
}
.history-item__icon {
  flex-shrink: 0;
  width: 40px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #16213e;
  border-radius: 4px;
  font-size: 14px;
}
.history-item__thumb {
  flex-shrink: 0;
  width: 40px;
  height: 30px;
  object-fit: cover;
  border-radius: 4px;
  background: #16213e;
}
.history-item__content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.history-item__title {
  font-size: 13px;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-item__channel {
  font-size: 11px;
  color: #8888a0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-item__time {
  flex-shrink: 0;
  font-size: 11px;
  color: #666680;
}

/* ── Sync Status Bar ── */
.sync-status {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-top: 1px solid #2a2a4a;
  background: #16213e;
  font-size: 11px;
  color: #8888a0;
  flex-shrink: 0;
}
.sync-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sync-dot--green { background: #22c55e; }
</style>
</head>
<body>

<div class="popup">
  <header class="popup__header">
    <svg class="popup__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="22" height="22">
      <defs><clipPath id="rs"><rect x="4" y="4" width="120" height="120" rx="24" ry="24"/></clipPath></defs>
      <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="#1a1a2e"/>
      <g clip-path="url(#rs)">
        <path d="M64 36 C38 36, 18 64, 18 64 C18 64, 38 92, 64 92 C90 92, 110 64, 110 64 C110 64, 90 36, 64 36 Z" fill="none" stroke="#ff0000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="64" cy="64" r="14" fill="none" stroke="#ff0000" stroke-width="5.5"/>
        <circle cx="64" cy="64" r="5" fill="#ff0000"/>
        <line x1="30" y1="98" x2="98" y2="30" stroke="#ff0000" stroke-width="6.5" stroke-linecap="round"/>
      </g>
    </svg>
    <h1 class="popup__title">YouTube History</h1>
  </header>

  <nav class="popup__tabs">
    <button class="popup__tab popup__tab--active">History</button>
    <button class="popup__tab">Devices <span class="tab-dot"></span></button>
    <button class="popup__tab">Settings</button>
  </nav>

  <main class="popup__content">
    <div class="history-list">
      <div class="history-list__search">
        <span class="history-list__search-icon">&#x1F50D;</span>
        <input class="history-list__search-input" type="text" placeholder="Search history..." readonly>
      </div>

      <div class="history-list__scroll">
        <!-- Today -->
        <div class="history-list__group-label">Today</div>

        <button class="history-item">
          <span class="history-item__icon">&#x25B6;</span>
          <div class="history-item__content">
            <span class="history-item__title">Building a Privacy-First Browser Extension</span>
            <span class="history-item__channel">Fireship</span>
          </div>
          <span class="history-item__time">3m ago</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x25B6;</span>
          <div class="history-item__content">
            <span class="history-item__title">Why You Should Care About Online Privacy</span>
            <span class="history-item__channel">Techlore</span>
          </div>
          <span class="history-item__time">27m ago</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x1F50D;</span>
          <div class="history-item__content">
            <span class="history-item__title">privacy browser extensions 2026</span>
          </div>
          <span class="history-item__time">1h ago</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x1F3AC;</span>
          <div class="history-item__content">
            <span class="history-item__title">How Google Tracks Everything You Do</span>
            <span class="history-item__channel">The Hated One</span>
          </div>
          <span class="history-item__time">2h ago</span>
        </button>

        <!-- Yesterday -->
        <div class="history-list__group-label">Yesterday</div>

        <button class="history-item">
          <span class="history-item__icon">&#x25B6;</span>
          <div class="history-item__content">
            <span class="history-item__title">Rust for TypeScript Developers - Full Course</span>
            <span class="history-item__channel">No Boilerplate</span>
          </div>
          <span class="history-item__time">Yesterday</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x1F464;</span>
          <div class="history-item__content">
            <span class="history-item__title">Theo - t3.gg</span>
          </div>
          <span class="history-item__time">Yesterday</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x25B6;</span>
          <div class="history-item__content">
            <span class="history-item__title">SQLite is Underrated for Browser Extensions</span>
            <span class="history-item__channel">Web Dev Simplified</span>
          </div>
          <span class="history-item__time">Yesterday</span>
        </button>

        <!-- This Week -->
        <div class="history-list__group-label">This Week</div>

        <button class="history-item">
          <span class="history-item__icon">&#x1F4CB;</span>
          <div class="history-item__content">
            <span class="history-item__title">Web Development Playlist</span>
          </div>
          <span class="history-item__time">3d ago</span>
        </button>

        <button class="history-item">
          <span class="history-item__icon">&#x25B6;</span>
          <div class="history-item__content">
            <span class="history-item__title">End-to-End Encryption Explained Simply</span>
            <span class="history-item__channel">Computerphile</span>
          </div>
          <span class="history-item__time">5d ago</span>
        </button>
      </div>
    </div>
  </main>

  <div class="sync-status">
    <span class="sync-dot sync-dot--green"></span>
    <span>Synced &middot; 3 devices</span>
  </div>
</div>

</body>
</html>
